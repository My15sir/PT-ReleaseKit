name: Release Linux Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bundle-release.yml
      - .github/workflows/controller-build.yml
      - README.md
      - PT-ReleaseKit.bat
      - PT-ReleaseKit.command
      - PT-ReleaseKit.desktop
      - PT-ReleaseKit.sh
      - PT-BDtool.bat
      - PT-BDtool.command
      - PT-BDtool.desktop
      - bdtool
      - bdtool-legacy.sh
      - bdtool.sh
      - install.sh
      - ptbd
      - ptbd-gui
      - ptbd-gui.py
      - ptbd-web
      - ptbd-web.py
      - ptbd_remote_backend.py
      - ptbd_core/**
      - docs/README.en.md
      - ptbd-remote.sh
      - ptbd-remote-start.sh
      - ptbd-start.sh
      - lib/**
      - scripts/build-bundle.sh
      - scripts/build-controller-app.py
      - scripts/audio-spectrum.py
      - scripts/deps.env
      - scripts/ensure-bundle.py
      - scripts/fetch-deps.sh
      - scripts/prepare-remote-runtime.sh
      - scripts/remote-upload-server.py
      - scripts/update-deps.sh

concurrency:
  group: bundle-latest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-linux-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fresh bundle inputs
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo libbluray-bin
          mkdir -p .ci-bin
          printf '%s\n' '#!/usr/bin/env bash' 'exec bd_info "$@"' > .ci-bin/BDInfo
          chmod +x .ci-bin/BDInfo
          echo "$PWD/.ci-bin" >> "$GITHUB_PATH"

      - name: Build Linux bundle asset
        env:
          PTBD_BUNDLE_FORCE_FETCH: "1"
          PTBD_FETCH_MODE: system
        run: |
          set -euo pipefail
          bash scripts/build-bundle.sh
          (cd dist && sha256sum --check PT-ReleaseKit-linux-amd64.tar.gz.sha256)
          tar -tzf dist/PT-ReleaseKit-linux-amd64.tar.gz \
            | grep -qx 'PT-ReleaseKit-linux-amd64/PT-ReleaseKit.sh'
          tar -tzf dist/PT-ReleaseKit-linux-amd64.tar.gz \
            | grep -qx 'PT-ReleaseKit-linux-amd64/ptbd_core/scanner.py'
          tar -xOzf dist/PT-ReleaseKit-linux-amd64.tar.gz \
            PT-ReleaseKit-linux-amd64/ptbd_core/scanner.py \
            | grep -q 'progress_callback'

      - name: Publish Linux bundle release
        uses: ncipollo/release-action@v1
        with:
          tag: bundle-latest
          name: PT ReleaseKit Linux Bundle Asset
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifacts: dist/PT-ReleaseKit-linux-amd64.tar.gz,dist/PT-ReleaseKit-linux-amd64.tar.gz.sha256
          artifactErrorsFailBuild: true
          body: |
            PT ReleaseKit 自动更新的 Linux 离线运行包：`PT-ReleaseKit-linux-amd64.tar.gz`。
            归档同时发布 SHA256 sidecar，控制端下载时会强制校验。
            主要给控制端打包和源码仓库按需下载使用。
            普通用户请优先使用 `portable-latest` 里的成品包。

      - name: Move release tag to this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/bundle-latest" \
            -f sha="$GITHUB_SHA" \
            -F force=true
