name: Release Linux Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bundle-release.yml
      - README.md
      - PT-BDtool.bat
      - PT-BDtool.command
      - PT-BDtool.desktop
      - bdtool
      - bdtool.sh
      - install.sh
      - ptbd
      - ptbd-gui
      - ptbd-gui.py
      - ptbd_remote_backend.py
      - ptbd-remote.sh
      - ptbd-remote-start.sh
      - ptbd-start.sh
      - lib/**
      - scripts/build-bundle.sh
      - scripts/deps.env
      - scripts/ensure-bundle.py
      - scripts/fetch-deps.sh
      - scripts/prepare-remote-runtime.sh
      - scripts/remote-upload-server.py
      - scripts/update-deps.sh

permissions:
  contents: write

jobs:
  publish-linux-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux bundle asset
        run: bash scripts/build-bundle.sh

      - name: Publish Linux bundle release
        uses: ncipollo/release-action@v1
        with:
          tag: bundle-latest
          name: PT-BDtool Linux Bundle Asset
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifacts: dist/PT-BDtool-linux-amd64.tar.gz
          artifactErrorsFailBuild: true
          body: |
            自动更新的 Linux 离线运行包。
            主要给控制端打包和源码仓库按需下载使用。
            普通用户请优先使用 `portable-latest` 里的成品包。
