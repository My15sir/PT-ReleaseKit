name: Validate Project

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Show shellcheck version
        run: shellcheck --version
      - name: ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          shellcheck -s bash -x \
            bdtool.sh \
            bdtool \
            install.sh \
            ptbd \
            ptbd-gui \
            ptbd-start.sh \
            ptbd-remote.sh \
            ptbd-remote-start.sh \
            PT-BDtool.sh \
            PT-BDtool.command \
            scripts/*.sh

  full-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime commands
        run: sudo apt-get update && sudo apt-get install -y ffmpeg mediainfo zip unzip
      - name: Run full-test.sh
        shell: bash
        run: |
          set -euo pipefail
          if ! ./scripts/full-test.sh; then
            echo '--- full-test.log ---'
            tail -n 200 bdtool-output/logs/full-test.log || true
            echo '--- full-test-results.tsv ---'
            cat bdtool-output/logs/full-test-results.tsv || true
            exit 1
          fi

  fetch-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime commands for system-mode bundling
        run: sudo apt-get update && sudo apt-get install -y ffmpeg mediainfo zip unzip
      - name: Prepare mock BDInfo command
        run: |
          mkdir -p .ci-bin
          cat > .ci-bin/BDInfo <<'SH'
          #!/usr/bin/env bash
          out_dir="${@: -1}"
          mkdir -p "$out_dir"
          echo "mock bdinfo" > "$out_dir/bdinfo.txt"
          SH
          chmod +x .ci-bin/BDInfo
      - name: Run fetch-deps
        run: |
          chmod +x scripts/fetch-deps.sh scripts/build-bundle.sh
          PATH="$PWD/.ci-bin:$PATH" PTBD_FETCH_MODE=system bash scripts/fetch-deps.sh
      - name: Build offline bundle
        run: PATH="$PWD/.ci-bin:$PATH" PTBD_FETCH_MODE=system bash scripts/build-bundle.sh
      - name: Verify bundle outputs
        run: |
          test -x third_party/bundle/linux-amd64/bin/ffmpeg
          test -x third_party/bundle/linux-amd64/bin/ffprobe
          test -x third_party/bundle/linux-amd64/bin/mediainfo
          test -x third_party/bundle/linux-amd64/bin/BDInfo
          test -f dist/PT-BDtool-linux-amd64.tar.gz

  offline-install:
    runs-on: ubuntu-latest
    needs: [fetch-deps]
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime commands for system-mode bundling
        run: sudo apt-get update && sudo apt-get install -y ffmpeg mediainfo zip unzip
      - name: Prepare mock BDInfo command
        run: |
          mkdir -p .ci-bin
          cat > .ci-bin/BDInfo <<'SH'
          #!/usr/bin/env bash
          out_dir="${@: -1}"
          mkdir -p "$out_dir"
          echo "mock bdinfo" > "$out_dir/bdinfo.txt"
          SH
          chmod +x .ci-bin/BDInfo
      - name: Build bundle then install offline
        shell: bash
        run: |
          set -euo pipefail
          if ! PATH="$PWD/.ci-bin:$PATH" PTBD_FETCH_MODE=system bash scripts/fetch-deps.sh; then
            echo '--- fetch-deps failed ---'
            exit 1
          fi
          if ! bash install.sh --offline; then
            echo '--- install.sh failed, dump diagnostics ---'
            command -v bdtool || true
            command -v ptbd || true
            command -v ptbd-gui || true
            ls -la "$HOME/.local/bin" || true
            ls -la "$HOME/.local/share/pt-bdtool/PT-BDtool-app" || true
            exit 1
          fi
      - name: Ensure installer has no apt calls
        run: |
          ! grep -Eq 'apt-get|apt ' install.sh
