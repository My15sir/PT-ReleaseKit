name: Release Portable Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/controller-build.yml
      - README.md
      - PT-ReleaseKit.bat
      - PT-ReleaseKit.command
      - PT-ReleaseKit.desktop
      - PT-ReleaseKit.sh
      - PT-BDtool.bat
      - PT-BDtool.command
      - PT-BDtool.desktop
      - PT-BDtool.sh
      - bdtool
      - bdtool-legacy.sh
      - bdtool.sh
      - ptbd-gui
      - ptbd-gui.py
      - ptbd_remote_backend.py
      - ptbd_core/**
      - docs/README.en.md
      - lib/**
      - scripts/build-controller-app.py
      - scripts/audio-spectrum.py
      - scripts/ensure-bundle.py
      - scripts/prepare-remote-runtime.sh
      - scripts/remote-upload-server.py

concurrency:
  group: portable-latest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-controller:
    name: Build Portable ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            built_path: dist/controller-app/windows/PT-ReleaseKit.exe
            upload_dir: artifact/PT-ReleaseKit-windows-portable
            artifact_name: PT-ReleaseKit-windows-portable
            release_archive: release-assets/PT-ReleaseKit-windows-portable.zip
            archive_format: zip
            package_layout: single-file
            smoke_path: dist/controller-app/windows/PT-ReleaseKit.exe
            quick_start_name: 打开前先看.txt
            quick_start_title: PT ReleaseKit Windows 快速开始
            quick_start_body: |
              1. 双击 PT-ReleaseKit.exe，在“连接设置”选择“本机电脑”或“远端 VPS”
              2. 本机模式：选择媒体与保存目录，先点“检查本机依赖”，再点“扫描本机”
              3. 远端模式：先在系统终端 SSH 登录并核对主机密钥，再填写连接信息并点“测试连接”
              4. 远端“扫描目录”留空只扫描 /home；/root、/data、/mnt、/media、/srv 需要明确填写
              5. 扫描后逐项勾选，点击“生成所选”，再到保存目录查看结果
              
              提醒：
              - 如果 Windows 拦截，请点“更多信息 -> 仍要运行”
              - 便携版不需要 Python 或 Git for Windows
              - 本机处理仍需系统 PATH 中有 ffmpeg、ffprobe、mediainfo；BDInfo 可选
              - 桌面便携版只生成单曲频谱；组合频谱请使用 Docker/Web 或带 NumPy、Pillow 的源码 CLI
              - 图床上传默认关闭，只有主动配置提供方、HTTPS 地址和 Token 后才执行
          - os: macos-14
            label: macOS
            built_path: dist/controller-app/macos/PT-ReleaseKit.app
            upload_dir: artifact/PT-ReleaseKit-macos-portable
            artifact_name: PT-ReleaseKit-macos-portable
            release_archive: release-assets/PT-ReleaseKit-macos-portable.zip
            archive_format: zip
            package_layout: app-bundle
            smoke_path: dist/controller-app/macos/PT-ReleaseKit.app/Contents/MacOS/PT-ReleaseKit
            quick_start_name: 打开前先看.txt
            quick_start_title: PT ReleaseKit macOS 快速开始
            quick_start_body: |
              1. 双击 PT-ReleaseKit.app；若被拦住，请右键应用后点“打开”
              2. 在“连接设置”选择“本机电脑”或“远端 VPS”
              3. 本机模式：选择媒体与保存目录，先点“检查本机依赖”，再点“扫描本机”
              4. 远端模式：先用系统 ssh 核对主机密钥，再填写连接信息并点“测试连接”
              5. 远端“扫描目录”留空只扫描 /home；/root、/data、/mnt、/media、/srv 需要明确填写
              6. 扫描后逐项勾选，点击“生成所选”，再到保存目录查看结果
              
              提醒：
              - 便携版不需要另装 Python 或 bash；首次验证主机密钥使用 macOS 自带 ssh
              - 本机处理仍需系统 PATH 中有 ffmpeg、ffprobe、mediainfo；BDInfo 可选
              - 桌面便携版只生成单曲频谱；组合频谱请使用 Docker/Web 或带 NumPy、Pillow 的源码 CLI
              - 图床上传默认关闭，只有主动配置提供方、HTTPS 地址和 Token 后才执行
          - os: ubuntu-latest
            label: Linux
            built_path: dist/controller-app/linux/PT-ReleaseKit
            upload_dir: artifact/PT-ReleaseKit-linux-portable
            artifact_name: PT-ReleaseKit-linux-portable
            release_archive: release-assets/PT-ReleaseKit-linux-portable.tar.gz
            archive_format: gztar
            package_layout: flatten-dir
            smoke_path: dist/controller-app/linux/PT-ReleaseKit/PT-ReleaseKit
            quick_start_name: 打开前先看.txt
            quick_start_title: PT ReleaseKit Linux 快速开始
            quick_start_body: |
              1. 解压 PT-ReleaseKit-linux-portable.tar.gz
              2. 优先双击 PT-ReleaseKit.desktop；如果桌面环境不认，再双击 PT-ReleaseKit.sh
              3. 在“连接设置”选择“本机电脑”或“远端 VPS”
              4. 本机模式：选择媒体与保存目录，先点“检查本机依赖”，再点“扫描本机”
              5. 远端模式：先用系统 ssh 核对主机密钥，再填写连接信息并点“测试连接”
              6. 远端“扫描目录”留空只扫描 /home；/root、/data、/mnt、/media、/srv 需要明确填写
              7. 扫描后逐项勾选，点击“生成所选”，再到保存目录查看结果
              
              提醒：
              - Deepin 25 / Ubuntu / Debian 桌面版优先尝试
              - 如果系统提示没执行权限，先运行：chmod +x PT-ReleaseKit.desktop PT-ReleaseKit.sh PT-ReleaseKit
              - Linux 便携版配置优先保存在程序同目录
              - 本机处理仍需系统 PATH 中有 ffmpeg、ffprobe、mediainfo；BDInfo 可选
              - 桌面便携版只生成单曲频谱；组合频谱请使用 Docker/Web 或带 NumPy、Pillow 的源码 CLI
              - 图床上传默认关闭，只有主动配置提供方、HTTPS 地址和 Token 后才执行
              - 只有 VPS 依赖自动安装不够时，程序才会额外联网下载 Linux 兜底运行包

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone controller app
        shell: bash
        run: python scripts/build-controller-app.py

      - name: Install Linux UI smoke dependency
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Smoke test built artifact
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          artifact = Path(r"${{ matrix.smoke_path }}")
          if not artifact.exists():
              raise SystemExit(f"missing artifact: {artifact}")
          subprocess.run([str(artifact), "--self-check"], check=True)
          core = subprocess.run(
              [str(artifact), "--core-cli", "version"],
              check=True,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=True,
          )
          if not core.stdout.startswith("bdtool "):
              raise SystemExit(f"packaged core CLI returned no version: {core!r}")
          if r"${{ matrix.label }}" == "Linux":
              subprocess.run(["xvfb-run", "-a", str(artifact), "--ui-smoke-check"], check=True)
          PY

      - name: Prepare upload package
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          built_path = Path(r"${{ matrix.built_path }}")
          upload_dir = Path(r"${{ matrix.upload_dir }}")
          quick_start_path = upload_dir / r"${{ matrix.quick_start_name }}"
          quick_start_title = r"""${{ matrix.quick_start_title }}"""
          quick_start_body = r"""${{ matrix.quick_start_body }}""".strip()
          package_layout = r"${{ matrix.package_layout }}"

          if upload_dir.exists():
              shutil.rmtree(upload_dir)
          upload_dir.mkdir(parents=True, exist_ok=True)

          if package_layout == "flatten-dir" and built_path.is_dir():
              for item in built_path.iterdir():
                  target = upload_dir / item.name
                  if item.is_dir():
                      shutil.copytree(item, target, symlinks=True)
                  else:
                      shutil.copy2(item, target)
          elif built_path.is_dir():
              shutil.copytree(built_path, upload_dir / built_path.name, symlinks=True)
          else:
              shutil.copy2(built_path, upload_dir / built_path.name)

          for runtime_name in (
              "PT-ReleaseKit.log",
              "PT-ReleaseKit-config.json",
              "PT-BDtool.log",
              "PT-BDtool-config.json",
          ):
              for runtime_file in upload_dir.rglob(runtime_name):
                  runtime_file.unlink()

          quick_start_path.write_text(
              quick_start_title + "\n\n" + quick_start_body + "\n",
              encoding="utf-8",
          )

          if package_layout == "flatten-dir":
              launcher = upload_dir / "PT-ReleaseKit.sh"
              launcher.write_text(
                  "#!/usr/bin/env bash\n"
                  "set -euo pipefail\n"
                  "SCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\" && pwd)\"\n"
                  "APP_BIN=\"$SCRIPT_DIR/PT-ReleaseKit\"\n"
                  "if [[ ! -x \"$APP_BIN\" ]]; then\n"
                  "  chmod +x \"$APP_BIN\" 2>/dev/null || true\n"
                  "fi\n"
                  "export PTBD_PORTABLE_CONFIG=1\n"
                  "exec \"$APP_BIN\" \"$@\"\n",
                  encoding="utf-8",
              )
              launcher.chmod(0o755)
              desktop_file = upload_dir / "PT-ReleaseKit.desktop"
              desktop_file.write_text(
                  "[Desktop Entry]\n"
                  "Version=1.0\n"
                  "Type=Application\n"
                  "Name=PT ReleaseKit\n"
                  "Comment=PT media release material generator\n"
                  "Exec=bash -lc 'SCRIPT_DIR=\"$(cd -P \"$(dirname \"$1\")\" && pwd)\"; export PTBD_PORTABLE_CONFIG=1; if [[ -x \"$SCRIPT_DIR/PT-ReleaseKit.sh\" ]]; then exec \"$SCRIPT_DIR/PT-ReleaseKit.sh\"; fi; exec \"$SCRIPT_DIR/PT-ReleaseKit\"' dummy %k\n"
                  "Terminal=false\n"
                  "StartupNotify=true\n"
                  "Categories=Utility;AudioVideo;\n"
                  "Icon=applications-multimedia\n",
                  encoding="utf-8",
              )
              desktop_file.chmod(0o755)
          PY

      - name: Pack portable archive
        shell: bash
        run: |
          if [[ "${{ matrix.label }}" == "macOS" ]]; then
            rm -f "${{ matrix.release_archive }}"
            mkdir -p "$(dirname "${{ matrix.release_archive }}")"
            ditto -c -k --sequesterRsrc --keepParent \
              "${{ matrix.upload_dir }}" \
              "${{ matrix.release_archive }}"
            exit 0
          fi
          python - <<'PY'
          import shutil
          from pathlib import Path

          upload_dir = Path(r"${{ matrix.upload_dir }}")
          archive_base = Path(r"${{ matrix.release_archive }}")
          archive_format = r"${{ matrix.archive_format }}"
          archive_base.parent.mkdir(parents=True, exist_ok=True)
          base_name = archive_base
          if archive_format == "gztar" and archive_base.name.endswith(".tar.gz"):
              base_name = archive_base.parent / archive_base.name[:-7]
          elif archive_base.suffix:
              base_name = archive_base.with_suffix("")
          archive_path = shutil.make_archive(str(base_name), archive_format, root_dir=upload_dir)
          print(f"created: {archive_path}")
          PY

      - name: Verify packaged archive
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ matrix.release_archive }}"
          verify_dir="artifact/verify-${{ matrix.label }}"
          rm -rf "$verify_dir"
          mkdir -p "$verify_dir"
          if [[ "${{ matrix.label }}" == "macOS" ]]; then
            ditto -x -k "$archive" "$verify_dir"
            app_path="$(find "$verify_dir" -type d -name 'PT-ReleaseKit.app' -print -quit)"
            test -n "$app_path"
            codesign --verify --deep --strict "$app_path"
            "$app_path/Contents/MacOS/PT-ReleaseKit" --self-check
            "$app_path/Contents/MacOS/PT-ReleaseKit" --core-cli version
          elif [[ "${{ matrix.label }}" == "Windows" ]]; then
            python -m zipfile -e "$archive" "$verify_dir"
            "$verify_dir/PT-ReleaseKit.exe" --self-check
            "$verify_dir/PT-ReleaseKit.exe" --core-cli version
          else
            tar -xzf "$archive" -C "$verify_dir"
            test -x "$verify_dir/PT-ReleaseKit"
            test -x "$verify_dir/PT-ReleaseKit.sh"
            test -x "$verify_dir/PT-ReleaseKit.desktop"
            "$verify_dir/PT-ReleaseKit" --self-check
            "$verify_dir/PT-ReleaseKit" --core-cli version
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.release_archive }}
          if-no-files-found: error

  publish-release:
    name: Publish Portable Release
    runs-on: ubuntu-latest
    needs: [build-controller]
    steps:
      - name: Wait for verified Linux bundle dependency
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            rm -rf bundle-gate
            mkdir -p bundle-gate
            bundle_sha="$(gh api \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/bundle-latest" \
              --jq '.object.sha' 2>/dev/null || true)"
            if [[ "$bundle_sha" == "$GITHUB_SHA" ]] \
              && gh release download bundle-latest \
              --repo "$GITHUB_REPOSITORY" \
              --pattern 'PT-ReleaseKit-linux-amd64.tar.gz*' \
              --dir bundle-gate \
              --clobber >/dev/null 2>&1 \
              && test -f bundle-gate/PT-ReleaseKit-linux-amd64.tar.gz \
              && test -f bundle-gate/PT-ReleaseKit-linux-amd64.tar.gz.sha256 \
              && (cd bundle-gate && sha256sum --check PT-ReleaseKit-linux-amd64.tar.gz.sha256); then
              exit 0
            fi
            echo "bundle-latest 尚未发布新名称资产，等待中（$attempt/60）"
            sleep 15
          done
          echo "bundle-latest 未在时限内提供可校验的新名称资产" >&2
          exit 1

      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p release-dist
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release-dist/ \;
          ls -lh release-dist

      - name: Publish release assets
        uses: ncipollo/release-action@v1
        with:
          tag: portable-latest
          name: PT ReleaseKit Portable Downloads
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release-dist/*
          body: |
            ## 下载

            不要下载源码，按系统下载一个压缩包就行。

            - Windows：`PT-ReleaseKit-windows-portable.zip`
            - macOS：`PT-ReleaseKit-macos-portable.zip`
            - Linux：`PT-ReleaseKit-linux-portable.tar.gz`

            ## 开始使用

            1. 解压后启动：Windows 双击 `PT-ReleaseKit.exe`，macOS 双击 `PT-ReleaseKit.app`，Linux 优先双击 `PT-ReleaseKit.desktop`
            2. 在“连接设置”选择“本机电脑”或“远端 VPS”
            3. 本机模式选择媒体与保存目录并点“检查本机依赖”；远端模式先用系统 SSH 核对主机密钥，再填写连接信息并点“测试连接”
            4. 扫描后逐项勾选需要处理的条目，再点“生成所选”

            本机模式不需要 VPS，但便携包不内置 `ffmpeg`、`ffprobe`、`mediainfo` 或 `BDInfo`。前三项必须在系统 `PATH` 中可用，`BDInfo` 为蓝光可选工具。

            远端模式留空“扫描目录”时只扫描 `/home`。`/root`、`/data`、`/mnt`、`/media`、`/srv` 需要明确填写；确实需要时才开启全盘扫描。

            图床上传默认关闭。只有主动配置提供方、HTTPS 地址和 Token 后才执行；非回环 HTTP 默认拒绝，明确接受可信内网明文风险时才设置 `PTBD_ALLOW_INSECURE_IMAGE_HOST=1`。便携版使用内置 Python/Paramiko 远端后端，在结果回传后上传，Token 不发送到媒体 VPS。

            程序会自动：

            - 扫描所选本机目录或明确允许的 VPS 目录
            - 生成截图和媒体信息
            - 本机模式直接保存，远端模式下载结果回你的电脑
            - 按配置清理这次任务的临时输出目录

            不会删你原始源文件。

            如果系统拦住：
            - Windows：`更多信息 -> 仍要运行`
            - macOS：右键应用后点一次 `打开`
            - Linux：如果桌面文件不生效，就改双击 `PT-ReleaseKit.sh`
            - Linux：如果提示无执行权限，先运行 `chmod +x PT-ReleaseKit.desktop PT-ReleaseKit.sh PT-ReleaseKit`
            - Linux：只有 VPS 依赖自动安装不够时，程序才会额外联网下载 Linux 兜底运行包

            说明：
            - 本项目为 AI 生成项目
            - 不接受反馈，不做答疑，不单独适配个别环境

      - name: Move release tag to this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/portable-latest" \
            -f sha="$GITHUB_SHA" \
            -F force=true
