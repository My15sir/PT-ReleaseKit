name: Release Portable Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/controller-build.yml
      - README.md
      - PT-BDtool.bat
      - PT-BDtool.command
      - PT-BDtool.desktop
      - PT-BDtool.sh
      - bdtool
      - bdtool-legacy.sh
      - bdtool.sh
      - ptbd-gui
      - ptbd-gui.py
      - ptbd_remote_backend.py
      - ptbd_core/**
      - docs/README.en.md
      - lib/**
      - scripts/build-controller-app.py
      - scripts/audio-spectrum.py
      - scripts/ensure-bundle.py
      - scripts/prepare-remote-runtime.sh
      - scripts/remote-upload-server.py

concurrency:
  group: portable-latest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-controller:
    name: Build Portable ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            built_path: dist/controller-app/windows/PT-BDtool.exe
            upload_dir: artifact/PT-BDtool-windows-portable
            artifact_name: PT-BDtool-windows-portable
            release_archive: release-assets/PT-BDtool-windows-portable.zip
            archive_format: zip
            package_layout: single-file
            smoke_path: dist/controller-app/windows/PT-BDtool.exe
            quick_start_name: 打开前先看.txt
            quick_start_title: PT ReleaseKit Windows 快速开始
            quick_start_body: |
              1. 先在系统终端 SSH 登录 VPS，通过可信渠道核对并接受主机密钥
              2. 双击 PT-BDtool.exe，填写 VPS 地址、端口、密码、本机保存目录
              3. 点击“测试连接”，再点击“扫描 VPS”
              4. 勾选要处理的条目，点击“生成所选”
              5. 等待结果自动下载回本机
              
              提醒：
              - 如果 Windows 拦截，请点“更多信息 -> 仍要运行”
              - 不需要安装 Python
              - 不需要安装 Git for Windows
          - os: macos-14
            label: macOS
            built_path: dist/controller-app/macos/PT-BDtool.app
            upload_dir: artifact/PT-BDtool-macos-portable
            artifact_name: PT-BDtool-macos-portable
            release_archive: release-assets/PT-BDtool-macos-portable.zip
            archive_format: zip
            package_layout: app-bundle
            smoke_path: dist/controller-app/macos/PT-BDtool.app/Contents/MacOS/PT-BDtool
            quick_start_name: 打开前先看.txt
            quick_start_title: PT ReleaseKit macOS 快速开始
            quick_start_body: |
              1. 先在系统终端 SSH 登录 VPS，通过可信渠道核对并接受主机密钥
              2. 双击 PT-BDtool.app；若被拦住，请右键应用后点“打开”
              3. 填 VPS 地址、端口、密码、本机保存目录并点击“测试连接”
              4. 返回工作台，点击“扫描 VPS”
              5. 勾选要处理的条目，点击“生成所选”
              6. 等待结果自动下载回本机
              
              提醒：
              - 不需要安装 Python
              - 不需要另装 Python 或 bash；首次验证主机密钥使用 macOS 自带 ssh
          - os: ubuntu-latest
            label: Linux
            built_path: dist/controller-app/linux/PT-BDtool
            upload_dir: artifact/PT-BDtool-linux-portable
            artifact_name: PT-BDtool-linux-portable
            release_archive: release-assets/PT-BDtool-linux-portable.tar.gz
            archive_format: gztar
            package_layout: flatten-dir
            smoke_path: dist/controller-app/linux/PT-BDtool/PT-BDtool
            quick_start_name: 打开前先看.txt
            quick_start_title: PT ReleaseKit Linux 快速开始
            quick_start_body: |
              1. 解压 PT-BDtool-linux-portable.tar.gz
              2. 先在系统终端 SSH 登录 VPS，核对并接受主机密钥
              3. 优先双击 PT-BDtool.desktop；如果桌面环境不认，再双击 PT-BDtool.sh
              4. 填写配置并点“测试连接”，再点击“扫描 VPS”
              5. 勾选条目，点击“生成所选”
              
              提醒：
              - Deepin 25 / Ubuntu / Debian 桌面版优先尝试
              - 如果系统提示没执行权限，先运行：chmod +x PT-BDtool.desktop PT-BDtool.sh PT-BDtool
              - Linux 便携版配置优先保存在程序同目录
              - 只有 VPS 依赖自动安装不够时，程序才会额外联网下载 Linux 兜底运行包

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone controller app
        shell: bash
        run: python scripts/build-controller-app.py

      - name: Install Linux UI smoke dependency
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Smoke test built artifact
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          artifact = Path(r"${{ matrix.smoke_path }}")
          if not artifact.exists():
              raise SystemExit(f"missing artifact: {artifact}")
          subprocess.run([str(artifact), "--self-check"], check=True)
          if r"${{ matrix.label }}" == "Linux":
              subprocess.run(["xvfb-run", "-a", str(artifact), "--ui-smoke-check"], check=True)
          PY

      - name: Prepare upload package
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          built_path = Path(r"${{ matrix.built_path }}")
          upload_dir = Path(r"${{ matrix.upload_dir }}")
          quick_start_path = upload_dir / r"${{ matrix.quick_start_name }}"
          quick_start_title = r"""${{ matrix.quick_start_title }}"""
          quick_start_body = r"""${{ matrix.quick_start_body }}""".strip()
          package_layout = r"${{ matrix.package_layout }}"

          if upload_dir.exists():
              shutil.rmtree(upload_dir)
          upload_dir.mkdir(parents=True, exist_ok=True)

          if package_layout == "flatten-dir" and built_path.is_dir():
              for item in built_path.iterdir():
                  target = upload_dir / item.name
                  if item.is_dir():
                      shutil.copytree(item, target)
                  else:
                      shutil.copy2(item, target)
          elif built_path.is_dir():
              shutil.copytree(built_path, upload_dir / built_path.name)
          else:
              shutil.copy2(built_path, upload_dir / built_path.name)

          quick_start_path.write_text(
              quick_start_title + "\n\n" + quick_start_body + "\n",
              encoding="utf-8",
          )

          if package_layout == "flatten-dir":
              launcher = upload_dir / "PT-BDtool.sh"
              launcher.write_text(
                  "#!/usr/bin/env bash\n"
                  "set -euo pipefail\n"
                  "SCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\" && pwd)\"\n"
                  "APP_BIN=\"$SCRIPT_DIR/PT-BDtool\"\n"
                  "if [[ ! -x \"$APP_BIN\" ]]; then\n"
                  "  chmod +x \"$APP_BIN\" 2>/dev/null || true\n"
                  "fi\n"
                  "export PTBD_PORTABLE_CONFIG=1\n"
                  "exec \"$APP_BIN\" \"$@\"\n",
                  encoding="utf-8",
              )
              launcher.chmod(0o755)
              desktop_file = upload_dir / "PT-BDtool.desktop"
              desktop_file.write_text(
                  "[Desktop Entry]\n"
                  "Version=1.0\n"
                  "Type=Application\n"
                  "Name=PT ReleaseKit\n"
                  "Comment=PT media release material generator\n"
                  "Exec=bash -lc 'SCRIPT_DIR=\"$(cd -P \"$(dirname \"$1\")\" && pwd)\"; export PTBD_PORTABLE_CONFIG=1; if [[ -x \"$SCRIPT_DIR/PT-BDtool.sh\" ]]; then exec \"$SCRIPT_DIR/PT-BDtool.sh\"; fi; exec \"$SCRIPT_DIR/PT-BDtool\"' dummy %k\n"
                  "Terminal=false\n"
                  "StartupNotify=true\n"
                  "Categories=Utility;AudioVideo;\n"
                  "Icon=applications-multimedia\n",
                  encoding="utf-8",
              )
              desktop_file.chmod(0o755)
          PY

      - name: Pack portable archive
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          upload_dir = Path(r"${{ matrix.upload_dir }}")
          archive_base = Path(r"${{ matrix.release_archive }}")
          archive_format = r"${{ matrix.archive_format }}"
          archive_base.parent.mkdir(parents=True, exist_ok=True)
          base_name = archive_base
          if archive_format == "gztar" and archive_base.name.endswith(".tar.gz"):
              base_name = archive_base.parent / archive_base.name[:-7]
          elif archive_base.suffix:
              base_name = archive_base.with_suffix("")
          archive_path = shutil.make_archive(str(base_name), archive_format, root_dir=upload_dir)
          print(f"created: {archive_path}")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.release_archive }}
          if-no-files-found: error

  publish-release:
    name: Publish Portable Release
    runs-on: ubuntu-latest
    needs: [build-controller]
    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p release-dist
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release-dist/ \;
          ls -lh release-dist

      - name: Publish release assets
        uses: ncipollo/release-action@v1
        with:
          tag: portable-latest
          name: PT ReleaseKit Portable Downloads
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release-dist/*
          body: |
            ## 下载

            PT ReleaseKit 原名 PT-BDtool。为兼容现有用户，压缩包和可执行文件暂时保留旧文件名。

            不要下载源码，按系统下载一个压缩包就行。

            - Windows：`PT-BDtool-windows-portable.zip`
            - macOS：`PT-BDtool-macos-portable.zip`
            - Linux：`PT-BDtool-linux-portable.tar.gz`

            ## 3 步上手

            1. 解压
            2. Windows 双击 `PT-BDtool.exe` / macOS 双击 `PT-BDtool.app` / Linux 优先双击 `PT-BDtool.desktop`
            3. 先用系统 SSH 核对 VPS 主机密钥；填写配置并测试连接，扫描后勾选条目，再点 `生成所选`

            VPS 上先放好视频 / 音频 / BDMV / ISO。

            程序会自动：

            - 扫描 VPS 媒体候选
            - 生成截图和媒体信息
            - 下载结果回你的电脑
            - 清理这次生成的 VPS 输出目录

            不会删你原始源文件。

            如果系统拦住：
            - Windows：`更多信息 -> 仍要运行`
            - macOS：右键应用后点一次 `打开`
            - Linux：如果桌面文件不生效，就改双击 `PT-BDtool.sh`
            - Linux：如果提示无执行权限，先运行 `chmod +x PT-BDtool.desktop PT-BDtool.sh PT-BDtool`
            - Linux：只有 VPS 依赖自动安装不够时，程序才会额外联网下载 Linux 兜底运行包

            说明：
            - 本项目为 AI 生成项目
            - 不接受反馈，不做答疑，不单独适配个别环境

      - name: Move release tag to this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/portable-latest" \
            -f sha="$GITHUB_SHA" \
            -F force=true
