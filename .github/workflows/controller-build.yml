name: Controller Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/controller-build.yml
      - README.md
      - PT-BDtool.bat
      - PT-BDtool.command
      - bdtool
      - bdtool.sh
      - ptbd-gui.py
      - ptbd_remote_backend.py
      - lib/**
      - scripts/build-controller-app.py
      - scripts/ensure-bundle.py
      - scripts/prepare-remote-runtime.sh
      - scripts/remote-upload-server.py

permissions:
  contents: write

jobs:
  build-controller:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            built_path: dist/controller-app/windows/PT-BDtool.exe
            upload_dir: artifact/PT-BDtool-windows-portable
            artifact_name: PT-BDtool-windows-portable
            release_zip: release-assets/PT-BDtool-windows-portable.zip
            smoke_path: dist/controller-app/windows/PT-BDtool.exe
            quick_start_name: 打开前先看.txt
            quick_start_title: PT-BDtool Windows 快速开始
            quick_start_body: |
              1. 双击 PT-BDtool.exe
              2. 填 VPS 地址、端口、密码、本机保存目录
              3. 点击“扫描 VPS 候选”
              4. 双击你要处理的条目
              5. 等待结果自动下载回本机
              
              提醒：
              - 如果 Windows 拦截，请点“更多信息 -> 仍要运行”
              - 不需要安装 Python
              - 不需要安装 Git for Windows
          - os: macos-14
            label: macOS
            built_path: dist/controller-app/macos/PT-BDtool.app
            upload_dir: artifact/PT-BDtool-macos-portable
            artifact_name: PT-BDtool-macos-portable
            release_zip: release-assets/PT-BDtool-macos-portable.zip
            smoke_path: dist/controller-app/macos/PT-BDtool.app/Contents/MacOS/PT-BDtool
            quick_start_name: 打开前先看.txt
            quick_start_title: PT-BDtool macOS 快速开始
            quick_start_body: |
              1. 双击 PT-BDtool.app
              2. 如果第一次被系统拦住，请右键应用，点“打开”
              3. 填 VPS 地址、端口、密码、本机保存目录
              4. 点击“扫描 VPS 候选”
              5. 双击你要处理的条目
              6. 等待结果自动下载回本机
              
              提醒：
              - 不需要安装 Python
              - 不需要安装 bash / ssh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone controller app
        shell: bash
        run: python scripts/build-controller-app.py

      - name: Smoke test built artifact
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          artifact = Path(r"${{ matrix.smoke_path }}")
          if not artifact.exists():
              raise SystemExit(f"missing artifact: {artifact}")
          subprocess.run([str(artifact), "--self-check"], check=True)
          PY

      - name: Prepare upload package
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          built_path = Path(r"${{ matrix.built_path }}")
          upload_dir = Path(r"${{ matrix.upload_dir }}")
          quick_start_path = upload_dir / r"${{ matrix.quick_start_name }}"
          quick_start_title = r"""${{ matrix.quick_start_title }}"""
          quick_start_body = r"""${{ matrix.quick_start_body }}""".strip()

          if upload_dir.exists():
              shutil.rmtree(upload_dir)
          upload_dir.mkdir(parents=True, exist_ok=True)

          if built_path.is_dir():
              shutil.copytree(built_path, upload_dir / built_path.name)
          else:
              shutil.copy2(built_path, upload_dir / built_path.name)

          quick_start_path.write_text(
              quick_start_title + "\n\n" + quick_start_body + "\n",
              encoding="utf-8",
          )
          PY

      - name: Pack portable zip
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          upload_dir = Path(r"${{ matrix.upload_dir }}")
          archive_base = Path(r"${{ matrix.release_zip }}")
          archive_base.parent.mkdir(parents=True, exist_ok=True)
          zip_path = shutil.make_archive(str(archive_base.with_suffix("")), "zip", root_dir=upload_dir)
          print(f"created: {zip_path}")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.release_zip }}
          if-no-files-found: error

  publish-release:
    name: Publish portable release
    runs-on: ubuntu-latest
    needs: [build-controller]
    steps:
      - name: Download packaged zips
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p release-dist
          find release-assets -type f -name '*.zip' -exec cp {} release-dist/ \;
          ls -lh release-dist

      - name: Publish release assets
        uses: ncipollo/release-action@v1
        with:
          tag: portable-latest
          name: PT-BDtool 直接下载
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release-dist/*.zip
          body: |
            ## 下载

            不要下载源码，按系统下载一个压缩包就行。

            - Windows：`PT-BDtool-windows-portable.zip`
            - macOS：`PT-BDtool-macos-portable.zip`

            ## 3 步上手

            1. 解压
            2. Windows 双击 `PT-BDtool.exe` / macOS 双击 `PT-BDtool.app`
            3. 填 VPS 地址、端口、密码、本机保存目录，然后点 `扫描 VPS 候选` 并双击条目

            VPS 上先放好视频 / 音频 / BDMV / ISO。

            程序会自动：

            - 扫描 VPS 候选
            - 生成截图和媒体信息
            - 下载结果回你的电脑
            - 清理这次生成的 VPS 输出目录

            不会删你原始源文件。

            如果系统拦住：
            - Windows：`更多信息 -> 仍要运行`
            - macOS：右键应用后点一次 `打开`

            说明：
            - 本项目为 AI 生成项目
            - 不接受反馈，不做答疑，不单独适配个别环境
